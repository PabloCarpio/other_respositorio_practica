<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LabHub - Subir Laboratorio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-zinc-950 text-white">
  <nav class="bg-zinc-900 border-b border-zinc-700 px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <a href="index.html" class="text-3xl font-bold flex items-center gap-2">
        <span class="text-emerald-500">◼</span> LabHub
      </a>
      <a href="index.html" class="text-emerald-400 hover:underline">← Volver al repositorio</a>
    </div>
  </nav>

  <div class="max-w-2xl mx-auto mt-12 bg-zinc-900 p-8 rounded-3xl border border-zinc-700">
    <h1 class="text-3xl font-semibold mb-8">Subir nuevo laboratorio</h1>

    <form id="uploadForm" class="space-y-8">
      <!-- Nombre y descripción -->
      <div>
        <label class="block text-sm mb-2">Nombre del laboratorio</label>
        <input id="nombre" type="text" required class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3">
      </div>

      <div>
        <label class="block text-sm mb-2">Descripción</label>
        <textarea id="descripcion" rows="3" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3"></textarea>
      </div>

      <!-- Categoría -->
      <div>
        <label class="block text-sm mb-2">Categoría</label>
        <select id="categoria" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3"></select>
      </div>

      <!-- === ZONA DE SUBIDA REAL (Drag & Drop) === -->
      <div>
        <label class="block text-sm mb-2">Archivo del laboratorio</label>
        <div id="dropZone"
             class="border-2 border-dashed border-zinc-600 hover:border-emerald-500 rounded-2xl p-8 text-center cursor-pointer transition-colors">
          <div class="mx-auto w-12 h-12 bg-zinc-800 rounded-2xl flex items-center justify-center mb-3 text-3xl">
            📤
          </div>
          <p class="text-lg font-medium">Arrastra tu archivo aquí</p>
          <p class="text-zinc-400 text-sm mt-1">o</p>
          <button type="button" id="selectFileBtn"
                  class="mt-3 px-6 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm font-medium">
            Seleccionar archivo
          </button>
          <input type="file" id="fileInput" class="hidden">
        </div>

        <!-- Archivo seleccionado -->
        <div id="filePreview" class="hidden mt-4 bg-zinc-800 border border-zinc-700 rounded-xl p-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <span id="fileIcon" class="text-2xl">📄</span>
            <div>
              <p id="fileName" class="font-medium"></p>
              <p id="fileSize" class="text-xs text-zinc-400"></p>
            </div>
          </div>
          <button type="button" id="removeFileBtn" class="text-red-400 hover:text-red-500 text-xl">✕</button>
        </div>
      </div>

      <!-- Colaboradores -->
      <div>
        <label class="block text-sm mb-2">Colaboradores (agrega personas)</label>
        <div class="flex gap-2">
          <input id="colaboradorInput" type="text" placeholder="Nombre de estudiante" class="flex-1 bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3">
          <button type="button" id="addColabBtn" class="bg-zinc-700 hover:bg-zinc-600 px-6 rounded-xl">Agregar</button>
        </div>
        <div id="colaboradoresList" class="flex flex-wrap gap-2 mt-4"></div>
      </div>

      <button type="submit" 
              class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl text-lg font-semibold">
        Subir al repositorio
      </button>
    </form>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
