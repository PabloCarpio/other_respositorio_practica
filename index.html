<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repositorios</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-zinc-950 text-white">
  <!-- Navbar estilo GitHub -->
  <nav class="bg-zinc-900 border-b border-zinc-700 px-6 py-4 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-8">
        <a href="index.html" class="text-3xl font-bold flex items-center gap-2">
          <span class="text-emerald-500">◼</span> LabHub
        </a>
        <a href="index.html" class="hover:text-emerald-400">Repositorios</a>
      </div>

      <div class="flex-1 max-w-xl mx-8">
        <input id="searchInput" type="text" placeholder="Buscar laboratorios por nombre..." 
               class="w-full bg-zinc-800 border border-zinc-700 rounded-full px-5 py-2 focus:outline-none focus:border-emerald-500">
      </div>

      <div class="flex items-center gap-6">
        <a href="subir.html" 
           class="bg-emerald-600 hover:bg-emerald-500 px-5 py-2 rounded-lg font-medium flex items-center gap-2">
          <span class="text-xl">+</span> Nuevo Lab
        </a>
        <div id="userInfo" class="flex items-center gap-2 cursor-pointer">
          <!-- JS lo llena -->
        </div>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-8">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-semibold">Todos los laboratorios</h1>
      
      <!-- Filtros -->
      <div class="flex gap-3">
        <select id="categoryFilter" class="bg-zinc-900 border border-zinc-700 rounded-lg px-4 py-2">
          <option value="">Todas las categorías</option>
        </select>
      </div>
    </div>

    <div id="labsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Tarjetas generadas por JS -->
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
